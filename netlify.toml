[build]
  base = "frontend"
  command = "CI=false npm install && CI=false npm run build"
  publish = "frontend/build"

[build.environment]
  NODE_VERSION = "18"
  REACT_APP_API_URL = "http://localhost:8080"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
